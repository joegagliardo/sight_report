<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sight Report Agent | AI Analyst</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">S</span>
                    <span class="logo-text">SightReport</span>
                </div>
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="chat-history">
                <div class="history-item active">Recent Analysis</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">J</div>
                    <span>Joey Gagliardo</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-window">
            <header class="chat-header">
                <h1>Report Analyst</h1>
                <div class="status">Agent Online</div>
            </header>

            <div id="chat-messages" class="messages-container">
                <div class="message agent animate-entry">
                    <div class="message-content">
                        Hello! I'm your Sight Report Analyst. Provide a company name, and I'll fetch the pipeline data, analyze content gaps, and suggest followup GCP courses.
                    </div>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-container">
                    <textarea id="user-input" placeholder="Ask about a company report..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                    </button>
                </div>
                <div class="input-footer">
                    Sight Report Agent may provide inaccurate info. Verify important data.
                </div>
            </footer>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
